version: '3.9'

services:

  # ── MySQL ──────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: jf_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${DB_NAME:-jobfresh}
      MYSQL_USER: ${DB_USER:-jobfresh}
      MYSQL_PASSWORD: ${DB_PASS:-jobfresh123}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    # 200MB RAM limit — tuned via my.cnf
    deploy:
      resources:
        limits:
          memory: 220M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: jf_redis
    restart: unless-stopped
    command: redis-server --maxmemory 100mb --maxmemory-policy allkeys-lru --save ""
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 120M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Spring Boot Backend ───────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: jf_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_NAME: ${DB_NAME:-jobfresh}
      DB_USER: ${DB_USER:-jobfresh}
      DB_PASS: ${DB_PASS:-jobfresh123}
      REDIS_HOST: redis
      REDIS_PASSWORD: ""
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-min-32chars-long}
      APP_URL: ${APP_URL:-https://jobfresh.in}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@jobfresh.in}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123}
      CORS_EXTRA_ORIGINS: ${CORS_EXTRA_ORIGINS:-}
    deploy:
      resources:
        limits:
          memory: 320M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/jobs?page=0&size=1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: jf_nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    deploy:
      resources:
        limits:
          memory: 30M

  # ── Certbot (for free SSL) ────────────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: jf_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    profiles:
      - ssl   # Only starts when: docker compose --profile ssl up

volumes:
  mysql_data:
  redis_data:
  certbot_www:
  certbot_conf:
